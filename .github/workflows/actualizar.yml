name: Actualizar quiniela (resultados)

# Trae los resultados desde football-data.org, regenera el sitio y hace push.
# Netlify (conectado a este repo por GitHub) deploya solo al recibir el push.
#
# Único secret necesario (Settings -> Secrets and variables -> Actions):
#   FOOTBALL_DATA_TOKEN  -> token de football-data.org

on:
  schedule:
    - cron: '0 * * * *'        # cada hora (UTC). Ajustable. Desactivar tras el torneo.
  workflow_dispatch:            # botón para correrlo a mano

permissions:
  contents: write               # para hacer push de los resultados + sitio regenerado

concurrency:
  group: actualizar-quiniela
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Traer resultados (football-data.org)
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python build/fetch_resultados.py

      - name: Regenerar sitio (sin tarjeta — no hay navegador en CI)
        run: |
          python build/gen_jugador.py
          python build/gen_galeria.py
          python build/gen_calendar.py

      - name: Commit y push si hay cambios (Netlify deploya solo)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/resultados*.csv site/ data/historico/ 2>/dev/null || git add data/resultados*.csv site/
          if git diff --cached --quiet; then
            echo "Sin cambios — nada que deployar."
          else
            git commit -m "Auto: resultados + sitio ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
