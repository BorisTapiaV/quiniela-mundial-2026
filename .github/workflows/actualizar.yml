name: Actualizar quiniela (resultados + deploy)

# Cada 15 min en horario de partidos: consulta football-data (gratis) y SOLO regenera +
# deploya si entró un resultado nuevo. Si no cambió nada, no gasta deploy (ahorra créditos
# Netlify + minutos GitHub). Guarda los resultados en el repo para comparar la próxima vez.
#
# Secrets: FOOTBALL_DATA_TOKEN · NETLIFY_AUTH_TOKEN · NETLIFY_SITE_ID

on:
  schedule:
    # Cada 15 min SOLO en horario de partidos (UTC). Chile = UTC-4 en jun-jul.
    # Los resultados aterrizan ~18:00–06:00 UTC (~14:00–02:00 Chile).
    - cron: '*/15 18-23 * * *'
    - cron: '*/15 0-6 * * *'
  workflow_dispatch:

permissions:
  contents: write               # para guardar los resultados nuevos en el repo

concurrency:
  group: actualizar-quiniela
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Traer resultados (football-data.org)
        id: fetch
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: |
          python build/fetch_resultados.py
          python build/fetch_goleadores.py || echo "scorers fetch falló (no crítico, sigue)"
          if git diff --quiet -- data/resultados.csv data/resultados_ko.csv data/resultados_especiales.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Sin resultados nuevos — no se regenera ni se deploya."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "¡Resultado nuevo! Regenerando y deployando."
          fi

      - name: Regenerar sitio (si hubo cambio o disparo manual)
        if: steps.fetch.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          python build/gen_jugador.py
          python build/gen_galeria.py
          python build/gen_calendar.py

      - name: Deploy a Netlify (si hubo cambio o disparo manual)
        if: steps.fetch.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: >
          npx --yes netlify-cli deploy
          --dir=site --prod
          --site ${{ secrets.NETLIFY_SITE_ID }}
          --auth ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Guardar resultados en el repo (para comparar la próxima vez)
        if: steps.fetch.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/resultados.csv data/resultados_ko.csv data/resultados_especiales.csv data/goleadores.csv site/
          git commit -m "Auto: resultados nuevos ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push
