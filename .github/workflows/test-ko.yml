name: Test KO score API

# Temporal: inspecciona el objeto score de los KO terminados (penales/duración). Borrar tras usar.
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Inspeccionar score KO
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python build/inspect_ko.py
