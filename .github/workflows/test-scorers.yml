name: Test scorers API

# Workflow temporal para confirmar si el tier de football-data.org permite /scorers.
# Corre fetch_goleadores.py --dry con el token secreto y muestra el resultado en los logs.
# Borrar una vez confirmado.

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Probar /scorers
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python build/fetch_goleadores.py --dry
